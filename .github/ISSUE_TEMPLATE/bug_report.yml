name: Bug report
description: Report an unexpected repo-health-doctor behavior.
title: "[bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include raw secrets, tokens, private paths, local IPs, or unredacted policy values.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the observed behavior and the expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide safe reproduction steps and the command used.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Explain why this blocks or degrades maintainer workflow.
