name: Docs improvement
description: Suggest a documentation clarification or correction.
title: "[docs] "
labels:
  - documentation
body:
  - type: textarea
    id: gap
    attributes:
      label: Gap
      description: Describe what is unclear, missing, or inconsistent.
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggestion
      description: Point to the affected doc and the intended outcome.
