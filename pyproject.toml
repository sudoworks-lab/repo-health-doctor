[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "repo-health-doctor"
version = "0.1.0"
description = "Minimal CLI to diagnose basic repository health signals."
readme = "README.md"
requires-python = ">=3.10"
license = {file = "LICENSE"}
authors = [
  {name = "Codex"}
]
keywords = ["repository", "cli", "preflight", "ci"]
classifiers = [
  "Environment :: Console",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Topic :: Software Development :: Quality Assurance"
]
dependencies = []

[project.scripts]
repo-health-doctor = "repo_health_doctor.cli:main"
